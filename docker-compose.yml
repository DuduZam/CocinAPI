services:
  api:
    build: .
    container_name: cocinapi_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Mapeo de volumen para ver cambios en tiempo real
    environment:
      - DATABASE_URL=postgresql://cocinapi_user:supersecreto@db:5432/cocinapi_db
      - SECRET_KEY=tu_super_secreto_jwt_aqui
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: cocinapi_postgres
    environment:
      POSTGRES_USER: cocinapi_user
      POSTGRES_PASSWORD: supersecreto
      POSTGRES_DB: cocinapi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
